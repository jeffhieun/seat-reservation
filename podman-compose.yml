version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: seat-reservation-postgres
    environment:
      POSTGRES_DB: reservation_db
      POSTGRES_USER: reservation_user
      POSTGRES_PASSWORD: reservation_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reservation_user -d reservation_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Containerfile
    container_name: seat-reservation-app
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      SPRING_PROFILES_ACTIVE: dev
      JWT_SECRET: "your-secret-key-change-in-production-minimum-256-bits"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/reservation_db
      SPRING_DATASOURCE_USERNAME: reservation_user
      SPRING_DATASOURCE_PASSWORD: reservation_password
    restart: unless-stopped

volumes:
  postgres_data:

