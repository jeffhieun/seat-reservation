server:
  port: 8080
  servlet:
    session:
      cookie:
        http-only: true
        secure: false
        path: /

spring:
  application:
    name: seat-reservation-api
  profiles:
    active: dev
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

  # ===========================
  # JPA / Hibernate Configuration
  # ===========================
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    show-sql: false
    open-in-view: false

# ===========================
# JWT Configuration
# ===========================
jwt:
  secret: ${JWT_SECRET:your-secret-key-change-in-production-minimum-256-bits}
  expiration-days: 90

webhook:
  secret: ${WEBHOOK_SECRET:dev-secret}

# ===========================
# Logging Configuration
# ===========================
logging:
  level:
    com.linkz: INFO
    org.springframework.web: INFO

# ===========================
# Actuator Configuration
# ===========================
management:
  endpoints:
    web:
      exposure:
        include: "health,info"
  endpoint:
    health:
      show-details: always

