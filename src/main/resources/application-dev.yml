server:
  port: 8080
  servlet:
    session:
      cookie:
        http-only: true
        secure: false
        max-age: 3600
        path: /

spring:
  # ===========================
  # H2 In-Memory Database (Development)
  # ===========================
  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password:
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  # ===========================
  # JPA / Hibernate Configuration
  # ===========================
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
      use-new-id-generator-mappings: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20
          fetch_size: 50
        order_inserts: true
        order_updates: true
  
  # ===========================
  # Liquibase Configuration (Disabled for dev)
  # ===========================
  liquibase:
    enabled: false

  cache:
    type: simple
  jackson:
    default-property-inclusion: non_null

# ===========================
# Security Configuration
# ===========================
security:
  remember-me:
    key: dev-key-not-secure-change-me
    duration-days: 90

